<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash.js 高级播放器 (分栏视图)</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        /* 左右分栏主容器 */
        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 左侧：播放器区域 */
        .player-section {
            flex: 2; /* 占据2份宽度 */
            min-width: 0; /* 防止视频撑破容器 */
        }
        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
        }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* 右侧：控制与信息区域 */
        .control-section {
            flex: 1; /* 占据1份宽度 */
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 13px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        
        #log { color: #ff6b6b; margin-top: 10px; font-size: 14px; font-weight: bold; }

        /* 流信息显示面板 */
        .info-panel {
            margin-top: 20px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            flex-grow: 1; /* 填满剩余高度 */
        }
        .info-panel h3 { margin-top: 0; font-size: 16px; color: #4CAF50; margin-bottom: 15px; }
        .info-content {
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d4;
            white-space: pre-wrap;
        }

        /* 响应式设计：屏幕太小时改为上下堆叠 */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .player-section, .control-section { flex: auto; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="player-section">
            <h2>Dash.js 调试播放器</h2>
            <div class="video-container">
                <video id="videoPlayer" controls></video>
            </div>
        </div>

        <div class="control-section">
            <div class="input-group">
                <label for="streamUrl">DASH 流地址 (.mpd)</label>
                <input type="text" id="streamUrl" placeholder="https://...">
            </div>
            <div class="input-group">
                <label for="licenseKey">License Key (kid:key)</label>
                <input type="text" id="licenseKey" placeholder="kid:key">
            </div>
            <button onclick="playVideo()">加载并播放</button>
            <div id="log"></div>

            <div class="info-panel">
                <h3>流媒体实时信息</h3>
                <div id="streamInfo" class="info-content">等待播放...</div>
            </div>
        </div>
    </div>

    <script>
        let player;

        // Hex 转 Base64URL
        function hexToBase64Url(hexString) {
            hexString = hexString.replace(/[- ]/g, '');
            if (!/^[0-9a-fA-F]+$/.test(hexString)) return hexString;
            let bytes = new Uint8Array(hexString.length / 2);
            for (let i = 0; i < hexString.length; i += 2) {
                bytes[i / 2] = parseInt(hexString.substr(i, 2), 16);
            }
            let base64 = btoa(String.fromCharCode.apply(null, bytes));
            return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        // 更新面板上的流信息
        function updateStreamInfo() {
            if (!player) return;
            const infoDiv = document.getElementById('streamInfo');
            
            try {
                // 获取视频信息
                const videoQuality = player.getQualityFor('video');
                const videoBitrates = player.getBitrateInfoListFor('video');
                let videoText = "无视频轨";
                
                if (videoBitrates && videoBitrates.length > videoQuality) {
                    const vInfo = videoBitrates[videoQuality];
                    // 计算码率 Mbps 或 Kbps
                    const vKbps = (vInfo.bitrate / 1000).toFixed(0);
                    videoText = `分 辨 率 : ${vInfo.width} x ${vInfo.height}\n` +
                                `视频帧率 : ${vInfo.frameRate !== undefined ? vInfo.frameRate.toFixed(2) : '未知'} fps\n` +
                                `视频码率 : ${vKbps} Kbps\n` +
                                `视频编码 : ${vInfo.codec || '未知'}`;
                }

                // 获取音频信息
                const audioQuality = player.getQualityFor('audio');
                const audioBitrates = player.getBitrateInfoListFor('audio');
                let audioText = "无音频轨";

                if (audioBitrates && audioBitrates.length > audioQuality) {
                    const aInfo = audioBitrates[audioQuality];
                    const aKbps = (aInfo.bitrate / 1000).toFixed(0);
                    audioText = `音频码率 : ${aKbps} Kbps\n` +
                                `音频编码 : ${aInfo.codec || '未知'}`;
                }

                // 拼装显示
                infoDiv.innerText = `[ 视频参数 ]\n${videoText}\n\n[ 音频参数 ]\n${audioText}`;

            } catch (e) {
                console.warn("读取流信息时出错:", e);
            }
        }

        function playVideo() {
            const url = document.getElementById('streamUrl').value.trim();
            const keyInput = document.getElementById('licenseKey').value.trim();
            const videoElement = document.getElementById('videoPlayer');
            const logElement = document.getElementById('log');
            const infoElement = document.getElementById('streamInfo');
            
            logElement.innerText = "";
            infoElement.innerText = "加载中...";

            if (!url) {
                logElement.innerText = "错误：请输入 DASH 流地址！";
                return;
            }

            if (player) {
                player.destroy();
            }

            player = dashjs.MediaPlayer().create();
            let protData = null;

            if (keyInput) {
                const parts = keyInput.split(':');
                if (parts.length === 2) {
                    try {
                        const kidBase64 = hexToBase64Url(parts[0]);
                        const keyBase64 = hexToBase64Url(parts[1]);
                        protData = {
                            "org.w3.clearkey": { "clearkeys": { [kidBase64]: keyBase64 } }
                        };
                    } catch (e) {
                        logElement.innerText = "错误：kid:key 格式解析失败。";
                        return;
                    }
                } else {
                    logElement.innerText = "错误：License 格式不正确。";
                    return;
                }
            }

            if (protData) {
                player.setProtectionData(protData);
            }

            // 监听初始化成功和画质自适应切换事件，用于更新右侧信息面板
            player.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, updateStreamInfo);
            player.on(dashjs.MediaPlayer.events.QUALITY_CHANGE_RENDERED, updateStreamInfo);

            // 错误监听
            player.on(dashjs.MediaPlayer.events.ERROR, function(e) {
                if(e.error === "key_session") {
                    logElement.innerText = "解密失败：Key 错误或环境受限。";
                }
                console.error("Dash.js Error:", e);
            });

            player.initialize(videoElement, url, true);
        }
    </script>
</body>
</html>
