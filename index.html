<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player 高级调试器 (支持 ClearKey)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        /* 左右分栏主容器 */
        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 左侧：播放器区域 */
        .player-section {
            flex: 2;
            min-width: 0;
        }
        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            aspect-ratio: 16 / 9;
        }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* 右侧：控制与信息区域 */
        .control-section {
            flex: 1;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 13px;
        }
        button {
            background-color: #E53935; /* Shaka 红色风格 */
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #C62828; }
        
        #log { color: #ff6b6b; margin-top: 10px; font-size: 14px; font-weight: bold; }

        /* 流信息显示面板 */
        .info-panel {
            margin-top: 20px;
            background-color: #0d0d0d;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            flex-grow: 1;
        }
        .info-panel h3 { margin-top: 0; font-size: 16px; color: #4CAF50; margin-bottom: 15px; }
        .info-content {
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d4;
            white-space: pre-wrap;
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .player-section, .control-section { flex: auto; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="player-section">
            <h2>Shaka Player 调试内核</h2>
            <div class="video-container">
                <video id="videoPlayer" controls autoplay></video>
            </div>
        </div>

        <div class="control-section">
            <div class="input-group">
                <label for="streamUrl">DASH 流地址 (.mpd)</label>
                <input type="text" id="streamUrl" placeholder="https://...">
            </div>
            <div class="input-group">
                <label for="licenseKey">License Key (kid:key 十六进制)</label>
                <input type="text" id="licenseKey" placeholder="例如: 1234...:abcd...">
            </div>
            <button onclick="loadAndPlay()">加载并播放</button>
            <div id="log"></div>

            <div class="info-panel">
                <h3>流媒体实时信息</h3>
                <div id="streamInfo" class="info-content">等待播放...</div>
            </div>
        </div>
    </div>

    <script>
        let player;

        // 初始化 Shaka Player
        async function initApp() {
            // 安装 Polyfills 以修补浏览器的兼容性差异
            shaka.polyfill.installAll();

            if (shaka.Player.isBrowserSupported()) {
                const video = document.getElementById('videoPlayer');
                player = new shaka.Player(video);

                // 监听错误事件
                player.addEventListener('error', onErrorEvent);
                
                // 监听画质自适应切换事件，用于更新信息面板
                player.addEventListener('adaptation', updateStreamInfo);
                player.addEventListener('variantchanged', updateStreamInfo);
            } else {
                document.getElementById('log').innerText = "错误：您的浏览器不支持 Shaka Player！";
            }
        }

        // 处理错误信息
        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('Error code', error.code, 'object', error);
            const logElement = document.getElementById('log');
            
            // 友好的错误提示翻译
            if (error.code === 6001 || error.code === 6006) {
                logElement.innerText = "解密失败：DRM/Key 错误，或浏览器拦截。";
            } else if (error.code === 1002 || error.code === 1001) {
                logElement.innerText = "网络错误：无法拉取流文件 (可能是 CORS 跨域问题或 403 拦截)。";
            } else if (error.code === 4032) {
                logElement.innerText = "格式错误：当前浏览器不支持该视频编码 (请尝试使用 Safari)。";
            } else {
                logElement.innerText = "发生错误 (代码: " + error.code + ")，请查看控制台 (F12)。";
            }
        }

        // 更新流信息面板
        function updateStreamInfo() {
            if (!player) return;
            const infoDiv = document.getElementById('streamInfo');
            
            // 获取当前正在播放的所有轨道 (Variant Tracks)
            const tracks = player.getVariantTracks();
            // 找到状态为 active (正在渲染) 的那个轨道
            const activeTrack = tracks.find(t => t.active);

            if (activeTrack) {
                const vKbps = activeTrack.videoBandwidth ? (activeTrack.videoBandwidth / 1000).toFixed(0) : '未知';
                const aKbps = activeTrack.audioBandwidth ? (activeTrack.audioBandwidth / 1000).toFixed(0) : '未知';
                const fps = activeTrack.frameRate ? activeTrack.frameRate.toFixed(2) : '未知';

                const text = `[ 视频参数 ]\n` +
                             `分 辨 率 : ${activeTrack.width} x ${activeTrack.height}\n` +
                             `帧    率 : ${fps} fps\n` +
                             `视频码率 : ${vKbps} Kbps\n` +
                             `编 码 器 : ${activeTrack.videoCodec || '未知'}\n\n` +
                             `[ 音频参数 ]\n` +
                             `音频码率 : ${aKbps} Kbps\n` +
                             `编 码 器 : ${activeTrack.audioCodec || '未知'}`;
                
                infoDiv.innerText = text;
            }
        }

        // 核心播放逻辑
        async function loadAndPlay() {
            const url = document.getElementById('streamUrl').value.trim();
            const keyInput = document.getElementById('licenseKey').value.trim();
            const logElement = document.getElementById('log');
            const infoElement = document.getElementById('streamInfo');
            
            logElement.innerText = "";
            infoElement.innerText = "加载中...";

            if (!url) {
                logElement.innerText = "错误：请输入 DASH 流地址！";
                return;
            }

            // 配置 DRM (ClearKey)
            let clearKeysConfig = {};
            if (keyInput) {
                // Shaka 直接支持去除了连字符的 Hex 字符串！
                const cleanKeyInput = keyInput.replace(/-/g, '');
                const parts = cleanKeyInput.split(':');
                if (parts.length === 2) {
                    // 格式：'kid' : 'key'
                    clearKeysConfig[parts[0]] = parts[1];
                } else {
                    logElement.innerText = "错误：License 格式不正确，必须是 kid:key。";
                    return;
                }
            }

            // 应用配置
            player.configure({
                drm: {
                    clearKeys: clearKeysConfig
                },
                abr: {
                    enabled: true // 开启自适应码率
                }
            });

            // 加载视频流
            try {
                await player.load(url);
                console.log('加载成功！');
                updateStreamInfo(); // 初始拉取一次信息
            } catch (e) {
                onError(e);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
